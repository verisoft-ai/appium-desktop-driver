name: E2E Tests

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  e2e:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Build driver
        run: npm run build

      - name: Install Appium
        run: npm install -g appium@3.5.0

      - name: Install driver into Appium
        shell: pwsh
        run: appium driver install --source=local $PWD

      - name: Start Appium server
        shell: pwsh
        run: |
          $appiumPath = (Get-Command appium.cmd).Source
          Start-Process -FilePath $appiumPath `
            -ArgumentList "--log-level","info" `
            -RedirectStandardOutput "$env:GITHUB_WORKSPACE\appium.log" `
            -RedirectStandardError "$env:GITHUB_WORKSPACE\appium-err.log" `
            -NoNewWindow

      - name: Wait for Appium to be ready
        shell: pwsh
        run: |
          $timeout = 60
          $elapsed = 0
          do {
            Start-Sleep -Seconds 1
            $elapsed++
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:4723/status" -UseBasicParsing -ErrorAction Stop
              if ($response.StatusCode -eq 200) {
                Write-Host "Appium ready after ${elapsed}s"
                break
              }
            } catch {}
          } while ($elapsed -lt $timeout)
          if ($elapsed -ge $timeout) {
            Write-Error "Appium did not start within ${timeout}s"
            Get-Content "$env:GITHUB_WORKSPACE\appium.log" -ErrorAction SilentlyContinue
            Get-Content "$env:GITHUB_WORKSPACE\appium-err.log" -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Run E2E tests
        run: |
          npx vitest run --config vitest.e2e.config.ts `
            test/e2e/java-swing-form.e2e.ts `
            test/e2e/extension-powershell.e2e.ts `
            test/e2e/extension-patterns.e2e.ts `
            test/e2e/extension-webview.e2e.ts `
            test/e2e/actions.e2e.ts `
            test/e2e/element-commands.e2e.ts `
            test/e2e/extension-app-lifecycle.e2e.ts

      - name: Upload Appium logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs
          path: |
            appium.log
            appium-err.log
